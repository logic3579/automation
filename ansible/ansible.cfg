[defaults]
# Paths
inventory = ~/ansible/inventories/hosts
roles_path = ~/ansible/roles
local_tmp = ~/.ansible/tmp
remote_tmp = ~/.ansible/tmp
log_path = ~/ansible/ansible.log

# Template marker for managed files
ansible_managed = Ansible managed: {file} modified by {uid} on {host}

# Fact caching (JSON file, 24h TTL)
fact_caching = jsonfile
fact_caching_timeout = 86400
fact_caching_connection = ~/ansible/cache

# Plugins
connection_plugins = ~/ansible/plugins/connection
callback_plugins = ~/ansible/plugins/callback

# Performance
forks = 50
poll_interval = 1
internal_poll_interval = 0.001

# Runtime
executable = /bin/sh
interpreter_python = auto
deprecation_warnings = True
host_key_checking = False

[inventory]
cache = True
cache_plugin = jsonfile
unparsed_is_failed = True

[paramiko_connection]
record_host_keys = False

[ssh_connection]
retries = 3
pipelining = True
timeout = 120
control_path = %(directory)s/%%h-%%r
ssh_args = -C -o ControlMaster=auto -o ControlPersist=60s -o UserKnownHostsFile=/dev/null -o StrictHostKeyChecking=no -o PreferredAuthentications=publickey,password

---
- name: Check local kafka package
  ansible.builtin.stat:
    path: "{{ role_path }}/files/{{ kafka_pkg_name }}"
  delegate_to: localhost
  become: false
  remote_user: ansible
  register: kafka_pkg_result
  run_once: true

- name: Download kafka package
  ansible.builtin.get_url:
    url: "{{ kafka_pkg_url }}"
    dest: "{{ role_path }}/files/{{ kafka_pkg_name }}"
    validate_certs: true
  delegate_to: localhost
  become: false
  remote_user: ansible
  run_once: true
  when: not kafka_pkg_result.stat.exists

- name: Install dependency packages
  ansible.builtin.package:
    name: "{{ item }}"
    update_cache: true
  loop:
    - openjdk-17-jdk
  when: ansible_distribution == "Ubuntu"

- name: Copy kafka package to remote
  ansible.builtin.copy:
    src: "{{ kafka_pkg_name }}"
    dest: "/tmp/{{ kafka_pkg_name }}"
    mode: '0644'

- name: Extract kafka package
  ansible.builtin.unarchive:
    src: "/tmp/{{ kafka_pkg_name }}"
    dest: /opt
    mode: '0755'
    remote_src: true

- name: Create kafka symlink
  ansible.builtin.file:
    src: "/opt/{{ kafka_dir_name }}"
    dest: "{{ kafka_root_path }}"
    owner: kafka
    group: kafka
    state: link

- name: Clean up temporary files
  ansible.builtin.file:
    path: "/tmp/{{ kafka_pkg_name }}"
    state: absent

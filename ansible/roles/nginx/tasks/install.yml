---
- name: Install dependency packages
  ansible.builtin.package:
    name: "{{ item }}"
    state: present
    update_cache: true
  loop:
    - libssl-dev
    - libpcre3-dev
    - zlib1g-dev
    - libgeoip-dev
    - libjson-c-dev

- name: Copy nginx package to remote
  ansible.builtin.copy:
    src: "{{ nginx_pkg_name }}"
    dest: "/tmp/{{ nginx_pkg_name }}"
    mode: '0644'

- name: Extract nginx package
  ansible.builtin.unarchive:
    src: "/tmp/{{ nginx_pkg_name }}"
    dest: /opt
    mode: '0755'
    remote_src: true

- name: Clean up temporary files
  ansible.builtin.file:
    path: "/tmp/{{ nginx_pkg_name }}"
    state: absent

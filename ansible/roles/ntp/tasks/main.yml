---
# tasks file for ntp
- name: Set timezone
  ansible.builtin.timezone:
    name: "{{ ntp_timezone }}"

- name: Install NTP package
  ansible.builtin.package:
    name: "{{ ntp_package }}"
    state: present
    update_cache: true

- name: Deploy NTP configuration
  ansible.builtin.template:
    src: "{{ ntp_service }}.conf.j2"
    dest: "{{ ntp_config_file }}"
    owner: root
    group: root
    mode: '0644'
    backup: true
  notify: restart ntp

- name: Enable and start NTP service
  ansible.builtin.systemd:
    name: "{{ ntp_service_name }}"
    state: started
    enabled: "{{ ntp_enabled }}"
    daemon_reload: true

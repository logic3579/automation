---
promtail_arch_map:
  x86_64: amd64
  aarch64: arm64
promtail_arch: "{{ promtail_arch_map[ansible_architecture] | default('amd64') }}"
promtail_pkg_name: "promtail-linux-{{ promtail_arch }}.zip"
promtail_pkg_url: "https://github.com/grafana/loki/releases/download/v{{ promtail_version }}/{{ promtail_pkg_name }}"
promtail_bin: "{{ promtail_root_path }}/promtail-linux-{{ promtail_arch }}"
promtail_config_file: "{{ promtail_root_path }}/promtail-config.yaml"
promtail_service_name: promtail

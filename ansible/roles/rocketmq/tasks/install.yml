---
- name: Check local rocketmq package
  ansible.builtin.stat:
    path: "{{ role_path }}/files/{{ rocketmq_pkg_name }}"
  delegate_to: localhost
  become: false
  remote_user: ansible
  register: rocketmq_pkg_result
  run_once: true

- name: Download rocketmq package
  ansible.builtin.get_url:
    url: "{{ rocketmq_pkg_url }}"
    dest: "{{ role_path }}/files/{{ rocketmq_pkg_name }}"
    validate_certs: true
  delegate_to: localhost
  become: false
  remote_user: ansible
  run_once: true
  when: not rocketmq_pkg_result.stat.exists

- name: Install dependency packages
  ansible.builtin.package:
    name: openjdk-17-jdk
    update_cache: true

- name: Copy rocketmq package to remote
  ansible.builtin.copy:
    src: "{{ rocketmq_pkg_name }}"
    dest: "/tmp/{{ rocketmq_pkg_name }}"
    mode: '0644'

- name: Extract rocketmq package
  ansible.builtin.unarchive:
    src: "/tmp/{{ rocketmq_pkg_name }}"
    dest: /opt
    mode: '0755'
    remote_src: true

- name: Create rocketmq symlink
  ansible.builtin.file:
    src: "/opt/{{ rocketmq_dir_name }}"
    dest: "{{ rocketmq_root_path }}"
    owner: rocketmq
    group: rocketmq
    state: link

- name: Clean up temporary files
  ansible.builtin.file:
    path: "/tmp/{{ rocketmq_pkg_name }}"
    state: absent

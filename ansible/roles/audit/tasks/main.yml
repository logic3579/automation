---
# tasks file for audit

- name: Configure command audit logging
  ansible.builtin.blockinfile:
    path: /etc/profile
    marker: "# {mark} ANSIBLE MANAGED - command audit"
    block: |
      function log2syslog {
          export HISTTIMEFORMAT="[%F %T] [`who am i 2>/dev/null |awk -F'[() ]+' '{print $1, $(NF-1)}'`] "
          export PROMPT_COMMAND='\
              if [ -z "$OLD_PWD" ]; then
                  export OLD_PWD=$(pwd);
              fi;
              if [ ! -z "$LAST_CMD" ] && [ "$(history 1)" != "$LAST_CMD" ]; then
                  logger `whoami`_shell_cmd "[$OLD_PWD]$(history 1)";
              fi;
              export LAST_CMD="$(history 1)";
              export OLD_PWD=$(pwd);'
      }
      trap log2syslog DEBUG

- name: Set shell history size
  ansible.builtin.lineinfile:
    path: /etc/profile
    regexp: '^HISTSIZE='
    line: "HISTSIZE={{ audit_history_size }}"
    state: present

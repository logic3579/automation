---
- name: Create nginx group
  ansible.builtin.group:
    name: nginx
    state: present

- name: Create nginx user
  ansible.builtin.user:
    name: nginx
    group: nginx
    shell: /sbin/nologin
    create_home: false

- name: Deploy nginx configuration files
  ansible.builtin.template:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    owner: root
    group: root
    mode: '0644'
    backup: true
  loop:
    - { src: nginx.service.j2, dest: /etc/systemd/system/nginx.service }
    - { src: nginx.ld.conf.j2, dest: /etc/ld.so.conf.d/nginx.ld.conf }
  notify: restart nginx

- name: Set nginx directory permissions
  ansible.builtin.file:
    path: "{{ nginx_root_path }}"
    owner: nginx
    group: nginx
    mode: '0755'
    state: directory
    recurse: true

- name: Set nginx binary permissions
  ansible.builtin.file:
    path: "{{ nginx_bin }}"
    owner: root
    group: root
    mode: '4755'
    state: file

- name: Reload system library paths
  ansible.builtin.command: ldconfig
  changed_when: false

- name: Ensure logrotate directory exists
  ansible.builtin.file:
    path: /opt/cron
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Deploy logrotate configuration
  ansible.builtin.copy:
    src: nginx.logrotate
    dest: /opt/cron/nginx
    owner: root
    group: root
    mode: '0644'
    backup: true

- name: Configure logrotate cron job
  ansible.builtin.cron:
    name: 'logrotate nginx'
    minute: '58'
    hour: '23'
    job: '/usr/sbin/logrotate -f /opt/cron/nginx >> /opt/cron/cron.log 2>&1'

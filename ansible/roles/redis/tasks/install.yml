---
- name: Check local redis package
  ansible.builtin.stat:
    path: "{{ role_path }}/files/{{ redis_pkg_name }}"
  delegate_to: localhost
  become: false
  remote_user: ansible
  register: redis_pkg_result
  run_once: true

- name: Download redis package
  ansible.builtin.get_url:
    url: "{{ redis_pkg_url }}"
    dest: "{{ role_path }}/files/{{ redis_pkg_name }}"
    validate_certs: true
  delegate_to: localhost
  become: false
  remote_user: ansible
  run_once: true
  when: not redis_pkg_result.stat.exists

- name: Install dependency packages
  ansible.builtin.package:
    name: "{{ item }}"
    update_cache: true
  loop:
    - gcc
    - g++
    - libsystemd-dev
    - make
    - pkgconf
    - unzip

- name: Copy redis package to remote
  ansible.builtin.copy:
    src: "{{ redis_pkg_name }}"
    dest: "{{ redis_src_path }}/{{ redis_pkg_name }}"
    mode: '0644'

- name: Extract redis package
  ansible.builtin.unarchive:
    src: "{{ redis_src_path }}/{{ redis_pkg_name }}"
    dest: "{{ redis_src_path }}"
    mode: '0755'
    remote_src: true

- name: Build and install redis
  ansible.builtin.shell: |
    make MALLOC=jemalloc USE_SYSTEMD=yes
    make PREFIX="{{ redis_root_path }}" install
  args:
    creates: "{{ redis_root_path }}"
    chdir: "{{ redis_src_path }}/{{ redis_dir_name }}"
    executable: /bin/bash
  register: compile_result

---
# defaults file for kafka
# User-configurable variables

# Installation settings
kafka_root_path: /opt/kafka
kafka_version: "3.7.1"
kafka_scala_version: "2.13"
kafka_pkg_url: "https://downloads.apache.org/kafka/{{ kafka_version }}/kafka_{{ kafka_scala_version }}-{{ kafka_version }}.tgz"

# JVM settings
jvm_memory_opts: "-Xms2G -Xmx2G"

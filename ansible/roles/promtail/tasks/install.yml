---
- name: Check local promtail package
  ansible.builtin.stat:
    path: "{{ role_path }}/files/{{ promtail_pkg_name }}"
  delegate_to: localhost
  become: false
  register: promtail_pkg_result
  run_once: true

- name: Download promtail package
  ansible.builtin.get_url:
    url: "{{ promtail_pkg_url }}"
    dest: "{{ role_path }}/files/{{ promtail_pkg_name }}"
    validate_certs: true
  delegate_to: localhost
  become: false
  run_once: true
  when: not promtail_pkg_result.stat.exists

- name: Ensure unzip is installed
  ansible.builtin.package:
    name: unzip
    state: present

- name: Copy promtail package to remote
  ansible.builtin.copy:
    src: "{{ promtail_pkg_name }}"
    dest: "/tmp/{{ promtail_pkg_name }}"
    mode: "0644"

- name: Create promtail root directory
  ansible.builtin.file:
    path: "{{ promtail_root_path }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Unarchive promtail package
  ansible.builtin.unarchive:
    src: "/tmp/{{ promtail_pkg_name }}"
    dest: "{{ promtail_root_path }}"
    mode: "0755"
    remote_src: true

- name: Remove promtail temporary package
  ansible.builtin.file:
    path: "/tmp/{{ promtail_pkg_name }}"
    state: absent

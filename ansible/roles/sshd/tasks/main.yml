---
- name: Install OpenSSH server
  ansible.builtin.package:
    name: openssh-server
    state: present
    update_cache: true

- name: Deploy sshd configuration
  ansible.builtin.template:
    src: sshd_config.j2
    dest: /etc/ssh/sshd_config
    owner: root
    group: root
    mode: '0600'
    backup: true
    validate: 'sshd -t -f %s'
  notify: restart sshd

- name: Enable and start sshd
  ansible.builtin.systemd:
    name: sshd
    state: started
    enabled: true
    daemon_reload: true
